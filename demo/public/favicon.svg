<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="rounded">
      <rect x="6" y="6" width="52" height="52" rx="9" ry="9"/>
    </clipPath>
  </defs>

  <!-- Clipped content -->
  <g clip-path="url(#rounded)">
    <!-- White background -->
    <rect x="6" y="6" width="52" height="52" fill="#fff"/>

    <!-- Filled cells in checkerboard pattern -->
    <rect x="6" y="6" width="17.33" height="17.33" fill="#000"/>
    <rect x="40.67" y="6" width="17.33" height="17.33" fill="#000"/>
    <rect x="23.33" y="23.33" width="17.33" height="17.33" fill="#000"/>
    <rect x="6" y="40.67" width="17.33" height="17.33" fill="#000"/>
    <rect x="40.67" y="40.67" width="17.33" height="17.33" fill="#000"/>
  </g>

  <!-- Rounded border -->
  <rect x="6" y="6" width="52" height="52" rx="9" ry="9" fill="none" stroke="#000" stroke-width="2.5"/>

  <!-- Grid lines -->
  <line x1="23.33" y1="6" x2="23.33" y2="58" stroke="#000" stroke-width="1.5"/>
  <line x1="40.67" y1="6" x2="40.67" y2="58" stroke="#000" stroke-width="1.5"/>
  <line x1="6" y1="23.33" x2="58" y2="23.33" stroke="#000" stroke-width="1.5"/>
  <line x1="6" y1="40.67" x2="58" y2="40.67" stroke="#000" stroke-width="1.5"/>
</svg>
