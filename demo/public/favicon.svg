<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer circular background -->
  <circle cx="32" cy="32" r="30" fill="#fff" stroke="#000" stroke-width="2"/>

  <!-- 3x3 Sudoku grid -->
  <g stroke="#000" stroke-width="1.5" fill="none">
    <!-- Outer box -->
    <rect x="14" y="14" width="36" height="36" stroke-width="2"/>

    <!-- Horizontal lines -->
    <line x1="14" y1="26" x2="50" y2="26"/>
    <line x1="14" y1="38" x2="50" y2="38"/>

    <!-- Vertical lines -->
    <line x1="26" y1="14" x2="26" y2="50"/>
    <line x1="38" y1="14" x2="38" y2="50"/>
  </g>

  <!-- Some filled cells for visual interest -->
  <g fill="#000">
    <rect x="14" y="14" width="12" height="12"/>
    <rect x="38" y="14" width="12" height="12"/>
    <rect x="26" y="26" width="12" height="12"/>
    <rect x="14" y="38" width="12" height="12"/>
    <rect x="38" y="38" width="12" height="12"/>
  </g>
</svg>
