version: 2
updates:
  - package-ecosystem: 'cargo'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      cargo-dependencies:
        patterns:
          - "*"

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      actions-dependencies:
        patterns:
          - "*"

  # Keeps maturin for python builds up to date.
  - package-ecosystem: 'pip'
    directory: '/rustoku-py'
    schedule:
      interval: 'weekly'
    groups:
      python-dependencies:
        patterns:
          - "*"

  # Keeps npm packages for demo up to date.
  - package-ecosystem: 'npm'
    directory: '/demo'
    schedule:
      interval: 'weekly'
    ignore:
      - dependency-name: 'rustoku-wasm'
    groups:
      demo-dependencies:
        patterns:
          - "*"

  # Keeps npm packages for wasm bindings up to date.
  - package-ecosystem: 'npm'
    directory: '/rustoku-wasm'
    schedule:
      interval: 'weekly'
    groups:
      wasm-dependencies:
        patterns:
          - "*"
